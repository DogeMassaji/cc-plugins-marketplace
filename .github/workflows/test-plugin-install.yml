name: Test Plugin Installation

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  MARKETPLACE_NAME: dogemassaji-marketplace
  PLUGIN_NAME: dev
  PLUGIN_DIR: ./dev

jobs:
  validate:
    name: Validate marketplace and plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace manifest
        run: claude plugin validate .

      - name: Validate plugin manifest
        run: claude plugin validate "$PLUGIN_DIR"

  test-install:
    name: Test plugin installation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git to use HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Add marketplace
        run: claude plugin marketplace add ./

      - name: List marketplaces
        run: claude plugin marketplace list

      - name: Install plugin
        run: claude plugin install "$MARKETPLACE_NAME@$PLUGIN_NAME" --scope user